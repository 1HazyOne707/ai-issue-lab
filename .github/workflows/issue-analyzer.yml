name: Issue Analyzer

on:
  workflow_dispatch:
    inputs:
      issue:
        required: true
        type: number

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s \
            -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.inputs.issue }} \
            > issue.json

      - name: Build report
        run: |
          echo "Issue Analyzer Report" > analysis.txt
          echo "" >> analysis.txt
          jq -r '.title' issue.json >> analysis.txt
          echo "" >> analysis.txt
          jq -r '.body' issue.json >> analysis.txt

      - name: Comment result
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.inputs.issue }}/comments \
            -d "{\"body\": $(jq -Rs . < analysis.txt)}"
