name: Issue Analyzer
on:
  workflow_dispatch:
    inputs:
      owner:
        description: 'Repository Owner'
        required: true
      repo:
        description: 'Repository Name'
        required: true
      issue_number:
        description: 'Issue Number'
        required: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Fetch issue
        run: |
          curl -s -H "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/${{ github.event.inputs.owner }}/${{ github.event.inputs.repo }}/issues/${{ github.event.inputs.issue_number }} \
            > issue.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build report
        run: |
          echo "### Issue Analyzer Report" > analysis.txt
          echo "" >> analysis.txt
          echo "Title: $(jq -r '.title' issue.json)" >> analysis.txt
          echo "" >> analysis.txt
          jq -r '.body' issue.json >> analysis.txt

      - name: Comment result
        run: |
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.event.inputs.owner }}/${{ github.event.inputs.repo }}/issues/${{ github.event.inputs.issue_number }}/comments \
            -d "{\"body\": $(jq -Rs . < analysis.txt)}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
