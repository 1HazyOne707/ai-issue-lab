name: Issue Analyzer

on:
  workflow_dispatch:
    inputs:
      issue:
        required: true
        type: number

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show trigger proof
        run: echo "workflow_dispatch is active"

      - name: Fetch issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue view ${{ github.event.inputs.issue }} --json title,body > issue.json
