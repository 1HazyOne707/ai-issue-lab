name: Issue Analyzer

on:
  workflow_dispatch:
    inputs:
      issue:
        description: "Issue number to analyze"
        required: true

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get issue content
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue view ${{ github.event.inputs.issue }} --json title,body > issue.json

      - name: Analyze (structured output)
        run: |
          TITLE=$(jq -r '.title' issue.json)
          BODY=$(jq -r '.body' issue.json)

          cat > analysis.txt << 'EOT'
Issue Analysis

Title:
$TITLE

Body:
$BODY

Status:
- fetched: yes
- parsed: yes
- AI: not yet connected
EOT

      - name: Comment result
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.inputs.issue }} \
            --body-file analysis.txt
